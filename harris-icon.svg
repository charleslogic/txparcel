<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="har-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="har-stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#har-bg)"/>
  <!-- Houston downtown skyline silhouette -->
  <!-- left building -->
  <rect x="26" y="36" width="11" height="14" fill="url(#har-stone)"/>
  <!-- center tower with JPMorgan Chase Tower sloped top -->
  <rect x="42" y="22" width="13" height="28" fill="url(#har-stone)"/>
  <polygon points="42,22 55,15 55,22" fill="url(#har-stone)"/>
  <!-- right building -->
  <rect x="60" y="32" width="10" height="18" fill="url(#har-stone)"/>
  <!-- window hints -->
  <path stroke="#0a1628" stroke-width="0.9" d="M46,24 V50 M51,24 V50 M30,38 V50 M34,38 V50 M64,35 V50 M68,35 V50"/>
  <!-- GPS pin marking a parcel -->
  <circle cx="50" cy="63" r="12" fill="#ffffff"/>
  <circle cx="50" cy="63" r="5" fill="#0a1628"/>
  <polygon points="43,72 50,88 57,72" fill="#ffffff"/>
  <ellipse cx="50" cy="88" rx="7" ry="2.5" fill="#ffffff"/>
</svg>
