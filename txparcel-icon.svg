<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="tx-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="tx-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <clipPath id="tx-shape">
      <path d="M30,8 L52,8 L52,26 L72,22 L84,28 L80,48 L78,62 L68,80 L52,90 L42,90 L30,80 L18,68 L10,55 L8,38 L14,22 Z"/>
    </clipPath>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#tx-bg)"/>
  <!-- Texas state outline -->
  <path d="M30,8 L52,8 L52,26 L72,22 L84,28 L80,48 L78,62 L68,80 L52,90 L42,90 L30,80 L18,68 L10,55 L8,38 L14,22 Z" fill="url(#tx-gold)"/>
  <!-- Parcel grid, clipped to the state outline -->
  <g clip-path="url(#tx-shape)" stroke="#92400e" stroke-width="1.4" opacity="0.45">
    <line x1="25" y1="0" x2="25" y2="100"/>
    <line x1="42" y1="0" x2="42" y2="100"/>
    <line x1="59" y1="0" x2="59" y2="100"/>
    <line x1="76" y1="0" x2="76" y2="100"/>
    <line x1="0" y1="24" x2="100" y2="24"/>
    <line x1="0" y1="44" x2="100" y2="44"/>
    <line x1="0" y1="64" x2="100" y2="64"/>
    <line x1="0" y1="84" x2="100" y2="84"/>
  </g>
  <!-- GPS pin marking a parcel -->
  <circle cx="50" cy="40" r="13" fill="#ffffff"/>
  <circle cx="50" cy="40" r="5.5" fill="#0a1628"/>
  <polygon points="42,50 50,68 58,50" fill="#ffffff"/>
  <ellipse cx="50" cy="50" rx="8" ry="3" fill="#ffffff"/>
</svg>
