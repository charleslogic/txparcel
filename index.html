<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Texas Land Maps">
    <meta name="theme-color" content="#0a1628">
    <link rel="apple-touch-icon" sizes="180x180" href="txparcel-icon.png">
    <link rel="icon" type="image/svg+xml" href="txparcel-icon.svg">
    <title>Texas Land Maps</title>
    <style>
        :root {
            --accent: #007bff;
            --ink: #e8eef6;
            --muted: #9fb2c8;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--ink);
            background: linear-gradient(180deg, #1e3a5f 0%, #0a1628 100%);
            background-attachment: fixed;
            padding: max(24px, env(safe-area-inset-top)) 18px calc(40px + env(safe-area-inset-bottom));
        }

        .wrap {
            max-width: 680px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 22px;
        }

        header img {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
        }

        header h1 {
            margin: 12px 0 4px;
            font-size: 26px;
            letter-spacing: 0.2px;
        }

        header p {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }

        .locate {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            max-width: 360px;
            margin: 0 auto;
            padding: 15px 18px;
            border: none;
            border-radius: 14px;
            background: var(--accent);
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(0, 123, 255, 0.45);
            transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        .locate:hover { box-shadow: 0 6px 20px rgba(0, 123, 255, 0.65); }
        .locate:active { transform: scale(0.97); }
        .locate[disabled] { opacity: 0.7; cursor: default; }

        .status {
            min-height: 20px;
            margin: 10px 0 22px;
            text-align: center;
            font-size: 13px;
            color: var(--muted);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 14px;
        }

        .tile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 16px 10px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--ink);
            text-decoration: none;
            transition: transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .tile:hover, .tile:focus-visible {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            box-shadow: 0 0 16px rgba(0, 123, 255, 0.5);
            outline: none;
        }

        .tile:active { transform: scale(0.97); }

        .tile img {
            width: 76px;
            height: 76px;
            border-radius: 16px;
            display: block;
        }

        .tile .name { font-size: 15px; font-weight: 600; }
        .tile .sub { font-size: 11px; color: var(--muted); }

        /* All-Texas fallback tile spans the row, laid out horizontally */
        .tile-all {
            grid-column: 1 / -1;
            flex-direction: row;
            justify-content: center;
            gap: 16px;
            padding: 16px 18px;
            border-style: dashed;
        }

        .tile-all img { width: 56px; height: 56px; }
        .tile-all .copy { text-align: left; }

        footer {
            margin-top: 26px;
            text-align: center;
            font-size: 12px;
            color: var(--muted);
        }
    </style>
</head>

<body>
    <div class="wrap">
        <header>
            <img src="txparcel-icon.svg" alt="Texas Land Maps" />
            <h1>Texas Land Maps</h1>
            <p>Choose a county appraisal map</p>
        </header>

        <button class="locate" id="locateBtn" type="button">📍 Use my location</button>
        <div class="status" id="status"></div>

        <div class="grid" id="grid"></div>

        <footer>Property data from each county appraisal district.</footer>
    </div>

    <script>
        // County apps with a dedicated appraisal-district map.
        const COUNTIES = [
            { name: 'Tarrant', file: 'tarrant.html', icon: 'cowtown-icon.svg' },
            { name: 'Dallas',  file: 'dallas.html',  icon: 'dallas-icon.svg' },
            { name: 'Denton',  file: 'denton.html',  icon: 'denton-icon.svg' },
            { name: 'Collin',  file: 'collin.html',  icon: 'collin-icon.svg' },
            { name: 'Hood',    file: 'hood.html',    icon: 'hood-icon.svg' },
            { name: 'Parker',  file: 'parker.html',  icon: 'parker-icon.svg' }
        ];

        // The statewide map is the fallback for counties without a dedicated app.
        const STATEWIDE = 'statewide.html';

        // Build the tile grid.
        const grid = document.getElementById('grid');
        COUNTIES.forEach((c) => {
            const a = document.createElement('a');
            a.className = 'tile';
            a.href = c.file;
            a.innerHTML = `<img src="${c.icon}" alt="${c.name} County" />
                <span class="name">${c.name}</span>
                <span class="sub">County</span>`;
            grid.appendChild(a);
        });
        const all = document.createElement('a');
        all.className = 'tile tile-all';
        all.href = STATEWIDE;
        all.innerHTML = `<img src="txparcel-icon.svg" alt="All Texas" />
            <div class="copy">
                <div class="name">All Texas</div>
                <div class="sub">Statewide parcels — every other county</div>
            </div>`;
        grid.appendChild(all);

        // "Use my location": geolocate, reverse-geocode to a county, route to its
        // app — or to the statewide map when the county has no dedicated app.
        const COUNTY_FILES = {};
        COUNTIES.forEach((c) => { COUNTY_FILES[c.name.toLowerCase()] = c.file; });

        const countyKey = (name) => String(name || '').toLowerCase().replace(/county/g, '').trim();

        const btn = document.getElementById('locateBtn');
        const statusEl = document.getElementById('status');
        const setStatus = (m) => { statusEl.textContent = m; };
        const setBusy = (busy) => {
            btn.disabled = busy;
            btn.textContent = busy ? '⏳ Locating…' : '📍 Use my location';
        };

        btn.addEventListener('click', () => {
            if (!navigator.geolocation) { setStatus('Location is not supported on this device.'); return; }
            setBusy(true);
            setStatus('Finding your location…');
            navigator.geolocation.getCurrentPosition(onPosition, onGeoError, {
                enableHighAccuracy: true, timeout: 10000, maximumAge: 60000
            });
        });

        function onPosition(pos) {
            const { latitude: lat, longitude: lon } = pos.coords;
            const url = `https://nominatim.openstreetmap.org/reverse?format=json&zoom=10&addressdetails=1&lat=${lat}&lon=${lon}`;
            fetch(url, { headers: { 'Accept': 'application/json' } })
                .then((r) => r.json())
                .then((data) => {
                    const addr = (data && data.address) || {};
                    const county = addr.county || addr.city_district || '';
                    const file = COUNTY_FILES[countyKey(county)] || STATEWIDE;
                    setStatus(`Opening ${county ? county : 'the statewide map'}…`);
                    window.location.href = file;
                })
                .catch(() => {
                    setBusy(false);
                    setStatus('Couldn’t look up your county — pick one below.');
                });
        }

        function onGeoError() {
            setBusy(false);
            setStatus('Location unavailable or permission denied — pick a county below.');
        }
    </script>
</body>

</html>
