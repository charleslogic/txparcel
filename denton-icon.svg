<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="den-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="den-stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#den-bg)"/>
  <!-- Denton County Courthouse-on-the-Square silhouette -->
  <!-- main block -->
  <rect x="30" y="34" width="40" height="14" fill="url(#den-stone)"/>
  <!-- central clock tower -->
  <rect x="44" y="12" width="12" height="22" fill="url(#den-stone)"/>
  <polygon points="44,12 50,4 56,12" fill="url(#den-stone)"/>
  <rect x="49.2" y="1" width="1.6" height="4" fill="url(#den-stone)"/>
  <!-- clock face -->
  <circle cx="50" cy="22" r="3.2" fill="#0a1628"/>
  <path stroke="#cbd5e1" stroke-width="0.8" d="M50,22 L50,19.5 M50,22 L51.8,22.8"/>
  <!-- column hints -->
  <path stroke="#0a1628" stroke-width="1" d="M36,34 V48 M43,34 V48 M57,34 V48 M64,34 V48"/>
  <!-- GPS pin marking a parcel -->
  <circle cx="50" cy="63" r="12" fill="#ffffff"/>
  <circle cx="50" cy="63" r="5" fill="#0a1628"/>
  <polygon points="43,72 50,88 57,72" fill="#ffffff"/>
  <ellipse cx="50" cy="88" rx="7" ry="2.5" fill="#ffffff"/>
</svg>
