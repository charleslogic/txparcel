<!DOCTYPE html>
<html lang="en">

<head>
    <title>Land Owner</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Land Owner">
    <link rel="apple-touch-icon" href="TAD.png">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f0f0f0;
            overflow: hidden;
        }

        #map {
            height: 100vh;
            width: 100vw;
        }

        .custom-control-btn,
        .leaflet-control-zoom-in,
        .leaflet-control-zoom-out,
        .leaflet-control-geocoder-icon {
            background-color: white !important;
            width: 54px !important;
            height: 54px !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            font-size: 26px !important;
            border-radius: 14px !important;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3) !important;
            margin-bottom: 12px !important;
            border: none !important;
            color: black !important;
            text-decoration: none !important;
            transition: all 0.3s ease;
        }

        .btn-active {
            background-color: #007bff !important;
            color: white !important;
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.8) !important;
            animation: pulse-glow 2s infinite;
        }

        .btn-loading {
            animation: spin 1s linear infinite !important;
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 5px rgba(0, 123, 255, 0.6);
            }

            50% {
                box-shadow: 0 0 20px rgba(0, 123, 255, 0.9);
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        #zoom-display {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            color: #222;
            padding: 8px 14px;
            border-radius: 10px;
            font-family: -apple-system, sans-serif;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
            pointer-events: none;
            border: 1px solid #ddd;
        }

        .leaflet-bar {
            border: none !important;
            box-shadow: none !important;
        }

        .leaflet-control-zoom {
            margin-left: 12px !important;
            margin-top: 12px !important;
        }

        .parcel-popup {
            font-family: -apple-system, sans-serif;
            min-width: 220px;
        }

        .action-link {
            display: block;
            background: #007bff;
            color: white !important;
            text-align: center;
            padding: 14px;
            text-decoration: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div id="zoom-display">Zoom: 18</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

    <script>
        // 1. COUNTY REGISTRY WITH BOUNDS (Rough Latitude/Longitude Boxes)
        const counties = [
            {
                name: 'Tarrant',
                bounds: L.latLngBounds([32.55, -97.55], [32.99, -97.03]),
                url: 'https://mapit.tarrantcounty.com/arcgis/rest/services/Dynamic/TADParcels/MapServer/0',
                fields: { owner: 'OWNER_NAME', account: 'ACCOUNT', address: 'SITUS_ADDR', acres: 'LAND_ACRES' },
                getLink: (acc) => `https://tarrant.prodigycad.com/property-detail/${acc}`
            },
            {
                name: 'Dallas',
                bounds: L.latLngBounds([32.54, -97.03], [33.02, -96.51]),
                url: 'https://gis.dallascityhall.com/arcgis/rest/services/Basemap/DallasTaxParcels/FeatureServer/0',
                fields: {
                    owner: 'TAXPANAME1', account: 'ACCT',
                    address: (p) => `${p.ST_NUM || ''} ${p.ST_NAME || ''} ${p.ST_TYPE || ''}`.trim(),
                    acres: (p) => p.AREA_FEET ? (p.AREA_FEET / 43560).toFixed(2) : "0"
                },
                getLink: (acc) => `https://www.dallascad.org/AcctDetailRes.aspx?ID=${acc.trim()}`
            },
            {
                name: 'Denton',
                bounds: L.latLngBounds([32.99, -97.55], [33.40, -96.85]),
                url: 'https://geo.dentoncad.com/arcgis/rest/services/Public/2018_Parcels/MapServer/0',
                fields: { owner: 'OWNERNAME', account: 'PROPID', address: 'SITUSADDR', acres: 'ACRES' },
                getLink: (acc) => `https://search.dentoncad.com/property/${acc}`
            }
        ];

        const baseLayers = [
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxNativeZoom: 19, maxZoom: 22 }),
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxNativeZoom: 19, maxZoom: 22 }),
            L.tileLayer('https://basemap.nationalmap.gov/arcgis/rest/services/USGSTopo/MapServer/tile/{z}/{y}/{x}', { maxNativeZoom: 16, maxZoom: 22 })
        ];
        let currentBaseIndex = 0;

        const map = L.map('map', { center: [32.7357, -97.1091], zoom: 18, maxZoom: 22, zoomControl: true });
        map.addLayer(baseLayers[0]);

        const zoomDiv = document.getElementById('zoom-display');
        map.on('zoomend', () => { zoomDiv.innerHTML = `Zoom: ${map.getZoom()}`; });

        let activeLayer = null;
        let currentCountyName = null;
        let isOverlayActive = false;

        // 2. THE SNIFFER LOGIC
        function refreshCountyLayer() {
            if (!isOverlayActive) return;

            const center = map.getCenter();
            const btn = document.getElementById('tad-btn');

            // Find which county box contains the map center
            const matchedCounty = counties.find(c => c.bounds.contains(center));

            if (!matchedCounty) {
                if (activeLayer) { map.removeLayer(activeLayer); activeLayer = null; }
                currentCountyName = null;
                zoomDiv.innerHTML = `Zoom: ${map.getZoom()} (No County Data)`;
                return;
            }

            // If we are already showing this county, don't re-load it
            if (matchedCounty.name === currentCountyName) return;

            // Kill the old one
            if (activeLayer) { map.removeLayer(activeLayer); }

            currentCountyName = matchedCounty.name;
            btn.classList.add('btn-loading');
            btn.innerHTML = '⏳';
            zoomDiv.innerHTML = `Zoom: ${map.getZoom()} (${matchedCounty.name})`;

            activeLayer = L.esri.featureLayer({
                url: matchedCounty.url,
                style: () => ({ color: '#007bff', weight: 2, fillOpacity: 0.2 })
            });

            activeLayer.on('load', () => {
                btn.classList.remove('btn-loading');
                btn.innerHTML = '📋';
            });

            activeLayer.bindPopup((l) => {
                const p = l.feature.properties;
                const config = matchedCounty;
                const owner = p[config.fields.owner] || "N/A";
                const account = p[config.fields.account] || "N/A";
                const addr = typeof config.fields.address === 'function' ? config.fields.address(p) : (p[config.fields.address] || "N/A");
                const acres = typeof config.fields.acres === 'function' ? config.fields.acres(p) : (p[config.fields.acres] || "0");

                return `<div class="parcel-popup">
                    <b style="font-size:16px;">${owner}</b><br>
                    <small style="color:#666;">${addr}</small><br>
                    <table style="width:100%; font-size:13px; margin-top:8px; border-top: 1px solid #eee; padding-top:5px;">
                        <tr><td><b>County:</b></td><td>${config.name}</td></tr>
                        <tr><td><b>Acct:</b></td><td>${account}</td></tr>
                        <tr><td><b>Acres:</b></td><td>${acres}</td></tr>
                    </table>
                    <a href="${config.getLink(account)}" target="_blank" class="action-link">View Details</a>
                </div>`;
            });

            activeLayer.addTo(map);
        }

        function toggleParcels() {
            const btn = document.getElementById('tad-btn');
            isOverlayActive = !isOverlayActive;

            if (!isOverlayActive) {
                if (activeLayer) { map.removeLayer(activeLayer); activeLayer = null; }
                currentCountyName = null;
                btn.classList.remove('btn-active');
                btn.innerHTML = '📋';
                return;
            }

            btn.classList.add('btn-active');
            refreshCountyLayer();
        }

        // Trigger refresh on map move
        map.on('moveend', refreshCountyLayer);

        L.Control.geocoder({ position: 'topleft', collapsed: true }).addTo(map);

        const FieldControls = L.Control.extend({
            options: { position: 'topleft' },
            onAdd: function () {
                const container = L.DomUtil.create('div');
                const gpsBtn = L.DomUtil.create('a', 'custom-control-btn', container);
                gpsBtn.innerHTML = '🎯';
                gpsBtn.onclick = (e) => { e.preventDefault(); map.locate({ setView: true, maxZoom: 18 }); };

                const cycleBtn = L.DomUtil.create('a', 'custom-control-btn', container);
                cycleBtn.innerHTML = '🗺️';
                cycleBtn.onclick = (e) => {
                    e.preventDefault();
                    map.removeLayer(baseLayers[currentBaseIndex]);
                    currentBaseIndex = (currentBaseIndex + 1) % baseLayers.length;
                    map.addLayer(baseLayers[currentBaseIndex]);
                };

                const tadBtn = L.DomUtil.create('a', 'custom-control-btn', container);
                tadBtn.id = "tad-btn";
                tadBtn.innerHTML = '📋';
                tadBtn.onclick = (e) => { e.preventDefault(); toggleParcels(); };

                return container;
            }
        });
        map.addControl(new FieldControls());

        map.locate({ setView: true, maxZoom: 18 });
        let userMarker;
        map.on('locationfound', (e) => {
            if (userMarker) userMarker.setLatLng(e.latlng);
            else userMarker = L.marker(e.latlng).addTo(map);
            if (map.getZoom() < 18) map.setZoom(18);
        });
    </script>
</body>

</html>
