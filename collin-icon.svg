<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="col-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="col-stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#col-bg)"/>
  <!-- Domed courthouse silhouette -->
  <!-- main block -->
  <rect x="28" y="36" width="44" height="12" fill="url(#col-stone)"/>
  <!-- pediment / portico -->
  <polygon points="34,36 50,26 66,36" fill="url(#col-stone)"/>
  <!-- central dome on a drum -->
  <rect x="45" y="18" width="10" height="8" fill="url(#col-stone)"/>
  <path d="M44,18 a6,7 0 0 1 12,0 Z" fill="url(#col-stone)"/>
  <rect x="49.2" y="9" width="1.6" height="5" fill="url(#col-stone)"/>
  <circle cx="50" cy="9" r="1.6" fill="url(#col-stone)"/>
  <!-- columns -->
  <path stroke="#0a1628" stroke-width="1" d="M37,36 V48 M44,36 V48 M50,36 V48 M56,36 V48 M63,36 V48"/>
  <!-- GPS pin marking a parcel -->
  <circle cx="50" cy="63" r="12" fill="#ffffff"/>
  <circle cx="50" cy="63" r="5" fill="#0a1628"/>
  <polygon points="43,72 50,88 57,72" fill="#ffffff"/>
  <ellipse cx="50" cy="88" rx="7" ry="2.5" fill="#ffffff"/>
</svg>
