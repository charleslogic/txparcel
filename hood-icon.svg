<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="hood-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="hood-stone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#hood-bg)"/>
  <!-- Granbury 1890 Second Empire courthouse silhouette -->
  <!-- main block -->
  <rect x="30" y="36" width="40" height="12" fill="url(#hood-stone)"/>
  <!-- mansard roof corners -->
  <polygon points="30,36 33,30 37,30 36,36" fill="url(#hood-stone)"/>
  <polygon points="70,36 67,30 63,30 64,36" fill="url(#hood-stone)"/>
  <!-- central clock tower with mansard cap -->
  <rect x="44" y="14" width="12" height="22" fill="url(#hood-stone)"/>
  <polygon points="43,14 50,5 57,14" fill="url(#hood-stone)"/>
  <rect x="49.2" y="2" width="1.6" height="4" fill="url(#hood-stone)"/>
  <!-- clock face -->
  <circle cx="50" cy="23" r="3.2" fill="#0a1628"/>
  <path stroke="#cbd5e1" stroke-width="0.8" d="M50,23 L50,20.6 M50,23 L51.8,23.8"/>
  <!-- columns -->
  <path stroke="#0a1628" stroke-width="1" d="M36,36 V48 M43,36 V48 M57,36 V48 M64,36 V48"/>
  <!-- GPS pin marking a parcel -->
  <circle cx="50" cy="63" r="12" fill="#ffffff"/>
  <circle cx="50" cy="63" r="5" fill="#0a1628"/>
  <polygon points="43,72 50,88 57,72" fill="#ffffff"/>
  <ellipse cx="50" cy="88" rx="7" ry="2.5" fill="#ffffff"/>
</svg>
